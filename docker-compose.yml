services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mycointel-backend
    environment:
      - PYTHONPATH=/app
      - AUTO_TRAIN_MODELS=false
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/saved_models:/app/saved_models
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mycointel-frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    profiles:
      - frontend
